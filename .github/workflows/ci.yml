# Clinova CI — GitHub Actions (recommended for this repo)
# Runs on every push/PR to main: quality gates + Docker image builds + API smoke.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ""

  server:
    name: Server — check & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Unit tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://127.0.0.1:27017/clinova_test
          JWT_ACCESS_SECRET: ci_access_secret_at_least_32_chars_long
          JWT_REFRESH_SECRET: ci_refresh_secret_at_least_32_chars_long
          CLIENT_URL: http://localhost:5173

  docker:
    name: Docker build & smoke
    runs-on: ubuntu-latest
    needs: [client, server]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t clinova-api:ci ./server

      - name: Build Web image
        run: docker build -t clinova-web:ci ./client

      - name: Smoke — API /health
        run: |
          set -e
          docker run -d --name clinova-api-smoke \
            -e NODE_ENV=production \
            -e MONGO_URI=mongodb://127.0.0.1:27017/clinova \
            -e JWT_ACCESS_SECRET=ci_access_secret_at_least_32_chars_xx \
            -e JWT_REFRESH_SECRET=ci_refresh_secret_at_least_32_chars_x \
            -e CLIENT_URL=http://localhost \
            -e COOKIE_SECURE=false \
            -p 15001:5001 \
            clinova-api:ci

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:15001/health | grep -q ok; then
              echo "API health OK"
              docker rm -f clinova-api-smoke
              exit 0
            fi
            sleep 1
          done
          docker logs clinova-api-smoke || true
          docker rm -f clinova-api-smoke || true
          exit 1
